services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: product-search-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-products}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-products}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: product-search-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 0
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q ok'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: product-search-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  embeddings:
    build:
      context: ./embeddings
      dockerfile: Dockerfile
    container_name: product-search-embeddings
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
    ports:
      - "${EMBEDDINGS_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product-search-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-products}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      QDRANT_HTTP_PORT: 6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-products}
      QDRANT_PREFER_GRPC: "true"
      REDIS_URL: redis://redis:6379/0
      EMBEDDINGS_URL: http://embeddings:8001
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      SEARCH_HNSW_EF: ${SEARCH_HNSW_EF:-128}
      SEARCH_DEFAULT_LIMIT: ${SEARCH_DEFAULT_LIMIT:-10}
      SEARCH_MAX_LIMIT: ${SEARCH_MAX_LIMIT:-100}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      NETWORK_TIMEOUT_SECONDS: ${NETWORK_TIMEOUT_SECONDS:-10}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
